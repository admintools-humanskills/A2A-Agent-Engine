<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel & Event Concierge - Pixel Art UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <span class="header-star">&#9733;</span>
            <span class="header-title">Travel & Event Concierge</span>
        </div>
        <div class="header-right">
            <span id="connection-dot" class="dot dot-disconnected"></span>
            <span id="connection-status">Connecting...</span>
        </div>
    </header>

    <!-- Main container -->
    <main id="main-container">
        <!-- Chat Panel -->
        <section id="chat-panel">
            <div id="chat-messages"></div>
            <div id="typing-indicator" class="hidden">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-label">Agent is thinking...</span>
            </div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off" />
                <button type="submit" id="chat-send" title="Send">&gt;</button>
            </form>
        </section>

        <!-- Pixel Art Canvas Panel -->
        <section id="canvas-panel">
            <canvas id="pixel-canvas" width="480" height="480"></canvas>
            <div id="status-bar"></div>
        </section>
    </main>

    <script src="/static/js/sprites.js"></script>
    <script src="/static/js/animation.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
